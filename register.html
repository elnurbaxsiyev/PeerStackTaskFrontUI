<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main-layout">
  <section class="left-side">
    <div class="auth-box">
      <h1>Get Started Now</h1>

      <form action="#">
        <div class="rowinp">
          <label for="name">Name</label>
          <input  id="name" type="text" placeholder="Enter your name" >
        </div>

        <div class="rowinp">
          <label for="email">Email address</label>
          <input id="email" type="text" placeholder="Enter your email" >
        </div>

        <div class="rowinp">
          <label for="pass">Password</label>
          <input  id="pass" type="password" placeholder="Enter your password" >
        </div>

        <div class="check">
          <input type="checkbox" id="terms" >
          <label for="terms">
            I agree to the <a href="#">terms & policy</a>
          </label>
        </div>

        <button class="btn btn-primary">Signup</button>
      </form>

      <div class="ordivider">
        <span>or</span>
      </div>

      <div class="oauth">
        <button class="btn btn-solid">
            <img src="googleIcon.svg" alt="google icon">
            Sign in with Google
        </button>
        <button class="btn btn-solid">
            <img src="appleIcon.svg" alt="apple icon">
            Sign in with Apple
        </button>
      </div>

      <p class="signin-text">
        Have an account? <a href="login.html">Sign In</a>
      </p>
    </div>
  </section>

  <aside class="right-side">
    <img src="base.jpg" alt="leaf image" >
  </aside>
</main>
</body>
</html>
